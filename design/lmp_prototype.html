<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>LMP Acquisition DB — Prototype</title>
<style>
:root{
  --bg:#f5f6fa; --card:#ffffff; --border:#e2e4ed;
  --text:#1a1d2e; --text2:#4a4f6a; --muted:#9095b0;
  --primary:#3d5af1; --primary-dark:#2d47d4;
  --success:#16a34a; --warning:#d97706; --danger:#e05252;
  --purple:#7c3aed; --teal:#0d9488;
  --st-complete-bg:#dcfce7; --st-complete-tx:#15803d;
  --st-prog-bg:#fef3c7; --st-prog-tx:#b45309;
  --st-new-bg:#ede9fe; --st-new-tx:#6d28d9;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
[dir="rtl"] body{font-family:'Segoe UI','Tahoma',system-ui,sans-serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ---------- App shell ---------- */
#app{display:flex;min-height:100vh;}
[dir="rtl"] #app{flex-direction:row-reverse;}

/* Sidebar */
.sidebar{width:230px;flex:0 0 230px;background:var(--card);border-inline-end:1px solid var(--border);
  display:flex;flex-direction:column;padding:20px 14px;}
.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 22px 8px;}
.logo-mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;letter-spacing:.3px;}
.logo-text b{display:block;font-size:14.5px;color:var(--text);}
.logo-text span{display:block;font-size:11px;color:var(--muted);}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px;}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;text-decoration:none;
  color:var(--text2);font-size:13.5px;font-weight:500;border-inline-start:3px solid transparent;}
.nav a .ic{width:17px;text-align:center;font-size:14px;}
.nav a:hover{background:#f1f2f8;}
.nav a.active{background:#eef1ff;color:var(--primary-dark);border-inline-start-color:var(--primary);}
.nav-sep{height:1px;background:var(--border);margin:10px 4px;}
.sidebar-bottom{margin-top:auto;}
.langtoggle{display:flex;gap:4px;background:var(--bg);padding:3px;border-radius:8px;margin-bottom:14px;}
.langtoggle button{flex:1;border:none;background:transparent;padding:6px 0;border-radius:6px;font-size:12px;font-weight:700;color:var(--muted);}
.langtoggle button.active{background:var(--card);color:var(--primary-dark);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.userbox{display:flex;align-items:center;gap:9px;padding:8px;border-radius:9px;background:var(--bg);margin-bottom:8px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex:0 0 32px;}
.userbox .name{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3;}
.rolebadge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:#eef1ff;color:var(--primary-dark);font-weight:700;margin-top:2px;}
.signout{width:100%;border:1px solid var(--border);background:var(--card);color:var(--text2);padding:8px;border-radius:8px;font-size:12.5px;font-weight:600;}
.signout:hover{background:#fbeaea;color:var(--danger);border-color:#f3c9c9;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 26px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;}
.topbar h1{font-size:18px;margin:0;}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.dirty-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--warning);font-weight:600;}
.dirty-dot{width:7px;height:7px;border-radius:50%;background:var(--warning);}
.content{flex:1;overflow-y:auto;padding:24px 26px;}

/* Buttons */
.btn{border:none;border-radius:6px;padding:9px 15px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:#fbeaea;color:var(--danger);}
.btn-danger:hover{background:#f6d4d4;}
.btn-sm{padding:6px 10px;font-size:12px;}

/* Cards / generic */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;}
.pad-md{padding:18px;}
.pad-lg{padding:24px;}
.grid{display:grid;gap:16px;}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:700;}
.badge.Complete{background:var(--st-complete-bg);color:var(--st-complete-tx);}
.badge.InProgress{background:var(--st-prog-bg);color:var(--st-prog-tx);}
.badge.New{background:var(--st-new-bg);color:var(--st-new-tx);}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(circle at 20% 20%, #eef1ff 0%, var(--bg) 45%);}
.login-card{width:380px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:30px;
  box-shadow:0 10px 30px rgba(30,40,90,.07);}
.login-logo{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:18px;}
.login-logo .logo-mark{width:50px;height:50px;font-size:16px;margin-bottom:10px;}
.login-logo h2{margin:0;font-size:18px;}
.login-logo p{margin:3px 0 0;font-size:12.5px;color:var(--muted);}
.login-langtoggle{display:flex;justify-content:center;margin-bottom:18px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:9px 10px;
  font-size:13.5px;background:#fff;color:var(--text);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px #3d5af11f;}
.field .err{color:var(--danger);font-size:11.5px;margin-top:4px;}
.upload-box{border:1.5px dashed var(--border);border-radius:10px;padding:14px;text-align:center;margin-bottom:18px;background:#fafbfe;}
.upload-box p{font-size:12px;color:var(--text2);margin:0 0 9px;}
.note-ok{background:#eafbef;color:var(--success);font-size:12px;padding:7px 10px;border-radius:7px;margin-top:8px;}
.note-bad{background:#fdeded;color:var(--danger);font-size:12px;padding:7px 10px;border-radius:7px;margin-top:8px;}
.login-err{background:#fdeded;color:var(--danger);font-size:12.5px;padding:8px 10px;border-radius:7px;margin-top:10px;text-align:center;}
.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.kpi{padding:18px;}
.kpi .num{font-size:26px;font-weight:800;}
.kpi .lbl{font-size:12px;color:var(--muted);margin-top:2px;}
.spark{display:flex;gap:3px;align-items:flex-end;height:24px;margin-top:10px;}
.spark div{flex:1;border-radius:2px;}

.charts-row{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:20px;}
.chart-title{font-size:13px;font-weight:700;margin:0 0 14px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;}
.bar-row .lbl{width:90px;color:var(--text2);flex:0 0 90px;}
.bar-track{flex:1;background:var(--bg);border-radius:5px;height:14px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;}
.bar-row .val{width:24px;text-align:end;font-weight:700;color:var(--text2);}

.activity-list{display:flex;flex-direction:column;gap:0;}
.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.activity-item:last-child{border-bottom:none;}
.adot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 8px;}
.activity-item .txt{color:var(--text);}
.activity-item .time{color:var(--muted);font-size:11px;margin-top:2px;}

/* Site list */
.filters-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filters-row input[type=text]{flex:1;min-width:200px;border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:13px;}
.filters-row select{border:1px solid var(--border);border-radius:6px;padding:9px 10px;font-size:13px;background:#fff;}
.results-count{font-size:12px;color:var(--muted);margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:start;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);
  border-bottom:1px solid var(--border);}
tbody td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text);}
tbody tr:hover{background:#fafbfe;cursor:pointer;}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .ic{font-size:34px;margin-bottom:10px;}

/* Site detail */
.detail-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.section-panel{margin-bottom:16px;}
.section-head{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border);}
.section-dot{width:9px;height:9px;border-radius:50%;}
.section-head h3{margin:0;font-size:13.5px;}
.field-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:18px;}
.field-disp .lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}
.field-disp .val{font-size:13px;color:var(--text);font-weight:500;}
.field-disp .val.muted{color:var(--muted);font-weight:400;font-style:italic;}
.chip-yes{display:inline-block;background:var(--st-complete-bg);color:var(--st-complete-tx);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;}
.chip-no{display:inline-block;background:#eee;color:var(--muted);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;}

.warn-note{display:flex;gap:8px;background:#fff7e6;border:1px solid #f6dca6;color:#92660b;font-size:12px;padding:10px 12px;border-radius:8px;margin:10px 0;}
.path-row{display:flex;align-items:center;gap:10px;padding:12px 18px;flex-wrap:wrap;}
.path-row code{background:var(--bg);padding:5px 9px;border-radius:6px;font-size:12px;color:var(--text2);}
.file-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-top:1px solid var(--border);font-size:12.5px;}
.file-row .ftag{background:var(--bg);color:var(--text2);font-size:10.5px;padding:2px 7px;border-radius:99px;font-weight:700;}
.file-row .fname{font-weight:600;}
.file-row .fdate{color:var(--muted);margin-inline-start:auto;}
.file-row a{color:var(--primary);text-decoration:none;font-size:12px;font-weight:600;}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:6px;background:transparent;border-inline:none;border-top:none;}
.tab.active{color:var(--primary-dark);border-bottom-color:var(--primary);}
.tabdot{width:6px;height:6px;border-radius:50%;background:var(--success);}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.cb-field{display:flex;align-items:center;gap:8px;margin-top:24px;}
.cb-field input{width:16px;height:16px;}

/* export cards */
.export-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:18px;}
.export-card{padding:22px;text-align:center;transition:.15s;}
.export-card:hover{border-color:var(--primary);box-shadow:0 6px 18px rgba(61,90,241,.1);transform:translateY(-2px);}
.export-card .eicon{font-size:30px;margin-bottom:10px;}
.export-card h4{margin:4px 0;}
.export-card p{font-size:12px;color:var(--muted);margin:0 0 14px;}

/* admin */
.admin-tabs{display:flex;gap:4px;margin-bottom:18px;}
.admin-tabs button{padding:9px 16px;border:1px solid var(--border);background:var(--card);border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);}
.admin-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.toggle-pill{width:38px;height:21px;border-radius:99px;background:#ddd;position:relative;cursor:pointer;display:inline-block;}
.toggle-pill.on{background:var(--success);}
.toggle-pill .knob{width:17px;height:17px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.15s;}
.toggle-pill.on .knob{left:19px;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,22,40,.45);display:flex;align-items:center;justify-content:center;z-index:50;}
.modal{background:#fff;border-radius:12px;width:420px;max-width:92vw;padding:22px;}
.modal h3{margin:0 0 16px;font-size:15px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

.toast{position:fixed;bottom:20px;inset-inline-end:20px;background:var(--text);color:#fff;padding:12px 18px;border-radius:9px;
  font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.2);z-index:99;}
.toast.error{background:var(--danger);}

::-webkit-scrollbar{width:9px;}
::-webkit-scrollbar-thumb{background:#d6d9e6;border-radius:99px;}
</style>
</head>

/* ================= UTILS ================= */
function deriveStatus(site){
  const fac = site.acceptance && site.acceptance.fac === true;
  const contract = site.acq && site.acq.contract_date;
  if(contract && fac) return 'Complete';
  const anyFilled = [site.acq, site.sta, site.construction, site.acceptance].some(sec=>
    sec && Object.entries(sec).some(([k,v])=> typeof v==='boolean'? v===true : !!v)
  );
  if(contract || anyFilled) return 'In progress';
  return 'New';
}
function statusKey(s){ return s==='In progress' ? 'InProgress' : s; }
function statusLabel(s){ return s==='Complete'?t('status_complete'): s==='In progress'?t('status_in_progress'):t('status_new'); }

function filterSitesByPermissions(sites, user){
  if(!user) return [];
  if(user.role==='admin' || user.site_access==='all') return sites;
  if(user.site_access==='assigned') return sites.filter(s=> (user.allowed_sites||[]).includes(s.site_id));
  if(user.site_access==='region') return sites.filter(s=> (user.allowed_regions||[]).some(r=> (s.acq.address||'').includes(r)));
  return sites;
}
function canEditSite(user){
  if(!user) return false;
  if(user.role==='admin') return true;
  if(user.role==='data_entry') return true;
  return false;
}
function buildFolderPath(siteId, basePath){
  let bp = basePath.endsWith('\\') ? basePath : basePath+'\\';
  return bp+siteId+'\\';
}
function toFileUrl(p){ return 'file:///'+p.replace(/\\/g,'/'); }
function fmtDate(d){ if(!d) return ''; try{ const dt=new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;} }
function initials(name){ return (name||'?').split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase(); }
function fileIcon(name){ const ext=(name||'').split('.').pop().toLowerCase();
  if(ext==='pdf') return '📄'; if(['doc','docx'].includes(ext)) return '📝'; if(['jpg','jpeg','png'].includes(ext)) return '🖼️'; return '📎'; }

  sites.forEach(s=> counts[deriveStatus(s)]++ );
  const typologyCounts = {};
  sites.forEach(s=>{ const ty = s.acq.typology || '—'; typologyCounts[ty]=(typologyCounts[ty]||0)+1; });
  const maxTy = Math.max(1,...Object.values(typologyCounts));
  const total = sites.length || 1;

  const kpiCard = (label, num, color)=>`
   <div class="card kpi">
     <div class="num" style="color:${color}">${num}</div>
     <div class="lbl">${label}</div>
     <div class="spark">${Array.from({length:7}).map(()=>`<div style="height:${10+Math.random()*14}px;background:${color}33;"></div>`).join('')}</div>
   </div>`;

  const donutSegs = [
    {k:'Complete', c:'var(--success)'},{k:'In progress', c:'var(--warning)'},{k:'New', c:'var(--purple)'}
  ];
  let acc = 0;
  const circumf = 2*Math.PI*54;
  const donutPaths = donutSegs.map(seg=>{
    const val = counts[seg.k]/total;
    const dash = val*circumf;
    const el = `<circle cx="70" cy="70" r="54" fill="none" stroke="${seg.c}" stroke-width="16"
      stroke-dasharray="${dash} ${circumf-dash}" stroke-dashoffset="${-acc}" transform="rotate(-90 70 70)"/>`;
    acc += dash;
    return el;
  }).join('');

  const auditSorted = [...DATA.audit_log].sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp)).slice(0,10);
  const userByName = {}; DATA.users.forEach(u=> userByName[u.username]=u.display_name);
  const actionColor = {CREATE:'var(--success)', UPDATE:'var(--primary)', DELETE:'var(--danger)'};

  return `
  ${renderTopbar(t('nav_dashboard'), new Date().toLocaleDateString(LANG==='ar'?'ar-EG':'en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    CURRENT_USER.role!=='viewer' ? `<button class="btn btn-primary btn-sm" id="btn-add-site-top">+ ${t('btn_add_site')}</button>`:'')}
  <div class="content">
    <div class="kpis">
      ${kpiCard(t('kpi_total'), sites.length, 'var(--primary)')}
      ${kpiCard(t('kpi_complete'), counts.Complete, 'var(--success)')}
      ${kpiCard(t('kpi_in_progress'), counts['In progress'], 'var(--warning)')}
      ${kpiCard(t('kpi_new'), counts.New, 'var(--purple)')}
    </div>
    <div class="charts-row">
      <div class="card pad-md">
        <p class="chart-title">${t('chart_by_typology')}</p>
        ${Object.entries(typologyCounts).map(([ty,c])=>`
          <div class="bar-row">
            <div class="lbl">${escapeHtml(ty)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(c/maxTy)*100}%;background:var(--primary);"></div></div>
            <div class="val">${c}</div>
          </div>`).join('') || `<p style="color:var(--muted);font-size:12.5px;">—</p>`}
      </div>
      <div class="card pad-md" style="display:flex;gap:18px;align-items:center;">
        <div>
          <p class="chart-title">${t('chart_by_status')}</p>
          <svg width="140" height="140" viewBox="0 0 140 140">
            ${donutPaths}
            <text x="70" y="66" text-anchor="middle" font-size="20" font-weight="800" fill="var(--text)">${sites.length}</text>
            <text x="70" y="84" text-anchor="middle" font-size="10" fill="var(--muted)">${t('sites_label')}</text>
          </svg>
        </div>
        <div>
          ${donutSegs.map(s=>`<div style="display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:7px;">
            <span style="width:9px;height:9px;border-radius:50%;background:${s.c};display:inline-block;"></span>
            ${statusLabel(s.k)} <b style="margin-inline-start:auto;">${counts[s.k]}</b></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card pad-md">
      <p class="chart-title">${t('recent_activity')}</p>
      <div class="activity-list">
        ${auditSorted.map(a=>{
          const who = userByName[a.user]||a.user;
          const verb = a.action==='CREATE'?'created':a.action==='DELETE'?'deleted':'updated';
          return `<div class="activity-item">
            <span class="adot" style="background:${actionColor[a.action]||'var(--muted)'}"></span>
            <div><div class="txt"><b>${escapeHtml(who)}</b> ${verb} <b>${escapeHtml(a.site_id)}</b>${a.field? ' · '+escapeHtml(a.field):''}</div>
            <div class="time">${fmtDate(a.timestamp)}</div></div>
          </div>`;
        }).join('') || `<p style="color:var(--muted);font-size:12.5px;">—</p>`}
      </div>
    </div>
  </div>`;
}

let FORM_DRAFT = null; // working copy for new/edit
function blankSiteDraft(){
  const mk = (fields)=> Object.fromEntries(fields.map(f=>[f.key, f.type==='checkbox'?false:'']));
  return {
    site_id:'', acq:mk(ACQ_FIELDS), sta:mk(STA_FIELDS), construction:mk(CONSTRUCTION_FIELDS), acceptance:mk(ACCEPTANCE_FIELDS),
    files:[], meta:{created_at:new Date().toISOString(), created_by:CURRENT_USER.username, updated_at:new Date().toISOString(), updated_by:CURRENT_USER.username}
  };
}
function renderSiteForm(){
  const isNew = ROUTE_PARAM==='new';
  if(!FORM_DRAFT){
    if(isNew) FORM_DRAFT = blankSiteDraft();
    else {

        const val = FORM_DRAFT[sec.key][f.key];

          return `<div class="cb-field"><input type="checkbox" id="ff-${sec.key}-${f.key}" ${val?'checked':''} data-sec="${sec.key}" data-key="${f.key}" class="form-field-cb"><label for="ff-${sec.key}-${f.key}" style="font-size:13px;">${t(f.label_key)}</label></div>`;

}
function renderAddUserModal(){
  return `<div class="overlay" id="modal-overlay">
    <div class="modal">
      <h3>${t('btn_add_user')}</h3>
      <div class="field"><label>${t('username')}</label><input id="nu-username" type="text"></div>
      <div class="field"><label>${t('password')}</label><input id="nu-password" type="text"></div>
      <div class="field"><label>${t('col_display_name')}</label><input id="nu-display" type="text"></div>
      <div class="field"><label>${t('col_role')}</label>
        <select id="nu-role"><option value="data_entry">${t('role_data_entry')}</option><option value="viewer">${t('role_viewer')}</option><option value="admin">${t('role_admin')}</option></select></div>
      <div class="modal-foot">
        <button class="btn btn-ghost btn-sm" id="modal-cancel">${t('btn_cancel')}</button>
        <button class="btn btn-primary btn-sm" id="modal-save">${t('btn_save')}</button>
      </div>
    </div>
  </div>`;
}

/* ================= MAIN RENDER ================= */
function render(){
  document.documentElement.dir = LANG==='ar'?'rtl':'ltr';
  document.documentElement.lang = LANG;
  const app = document.getElementById('app');

  if(!CURRENT_USER){
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }

  let page='';
  if(ROUTE==='dashboard') page = renderDashboard();
  else if(ROUTE==='sites') page = renderSiteList();
  else if(ROUTE==='site-detail') page = renderSiteDetail();
  else if(ROUTE==='site-form') page = renderSiteForm();
  else if(ROUTE==='export') page = renderExport();
  else if(ROUTE==='admin') page = renderAdmin();
  else page = renderDashboard();

  app.innerHTML = `<div class="sidebar-wrap" style="display:flex;width:100%;">${renderSidebar()}<div class="main">${page}</div></div>`;
  if(TOAST) app.insertAdjacentHTML('beforeend', `<div class="toast ${TOAST.type==='error'?'error':''}">${TOAST.msg}</div>`);
  bindAppEvents();
}

/* ================= EVENT BINDING ================= */
function bindLogin(){
  document.querySelectorAll('[data-lang]').forEach(b=> b.onclick = ()=> setLanguage(b.dataset.lang));
  const trigger = document.getElementById('btn-upload-trigger');
  if(trigger) trigger.onclick = ()=> document.getElementById('json-upload').click();
  const up = document.getElementById('json-upload');
  if(up) up.onchange = (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        DATA = parsed; IS_DIRTY = false;
        UI.uploadMsg = {ok:true, text:t('upload_ok')};
      }catch(err){
        UI.uploadMsg = {ok:false, text:t('upload_bad')};
      }
      render();
    };
    reader.readAsText(file);
  };
  const btn = document.getElementById('btn-login');
  if(btn) btn.onclick = ()=>{
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value;
    const res = login(u,p);
    if(res.ok){ UI.loginErr=''; go('dashboard'); }
    else { UI.loginErr = res.error; render(); }
  };
}

function bindAppEvents(){
  document.querySelectorAll('[data-lang]').forEach(b=> b.onclick = ()=> setLanguage(b.dataset.lang));
  document.querySelectorAll('[data-route]').forEach(a=> a.onclick = (e)=>{
    e.preventDefault();
    const r = a.dataset.route;
    if(r==='site-form-new'){ FORM_DRAFT=null; UI.formTab='acq'; UI.siteIdErr=''; go('site-form','new'); }
    else go(r);
  });
  const so = document.getElementById('btn-signout'); if(so) so.onclick = logout;
  const expBtn = document.getElementById('btn-export-json');
  if(expBtn) expBtn.onclick = ()=>{
    const exportObj = {...DATA, meta:{...DATA.meta, exported_at:new Date().toISOString(), exported_by:CURRENT_USER.username}};
    const blob = new Blob([JSON.stringify(exportObj,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `lmp-data-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    IS_DIRTY = false;
    showToast(LANG==='ar'?'تم تصدير الملف':'JSON exported');
  };

  const addTop = document.getElementById('btn-add-site-top');
  if(addTop) addTop.onclick = ()=>{ FORM_DRAFT=null; UI.formTab='acq'; UI.siteIdErr=''; go('site-form','new'); };

  /* Dashboard / list specific */
  if(ROUTE==='sites'){
    const s = document.getElementById('search-input'); if(s){
      s.oninput = ()=>{ UI.search = s.value; render(); document.getElementById('search-input').focus(); document.getElementById('search-input').selectionStart = document.getElementById('search-input').value.length; };
    }
    const fs = document.getElementById('filter-status'); if(fs) fs.onchange = ()=>{ UI.statusFilter = fs.value; render(); };
    const ft = document.getElementById('filter-typology'); if(ft) ft.onchange = ()=>{ UI.typologyFilter = ft.value; render(); };
    document.querySelectorAll('tbody tr').forEach(tr=> tr.onclick = ()=> go('site-detail', tr.dataset.site));
    document.querySelectorAll('[data-view]').forEach(b=> b.onclick = (e)=>{ e.stopPropagation(); go('site-detail', b.dataset.view); });
    document.querySelectorAll('[data-edit]').forEach(b=> b.onclick = (e)=>{ e.stopPropagation(); FORM_DRAFT=null; UI.formTab='acq'; UI.siteIdErr=''; go('site-form', b.dataset.edit); });
  }

  if(ROUTE==='site-detail'){
    const back = document.getElementById('btn-back'); if(back) back.onclick = ()=> go('sites');
    const editBtn = document.getElementById('btn-edit-site'); if(editBtn) editBtn.onclick = ()=>{ FORM_DRAFT=null; UI.formTab='acq'; UI.siteIdErr=''; go('site-form', ROUTE_PARAM); };
    document.querySelectorAll('[data-openfolder]').forEach(b=> b.onclick = ()=> window.open(toFileUrl(b.dataset.openfolder),'_blank'));
    document.querySelectorAll('[data-copypath]').forEach(b=> b.onclick = ()=>{
      navigator.clipboard?.writeText(b.dataset.copypath).catch(()=>{});
      showToast(LANG==='ar'?'تم نسخ المسار':'Path copied');
    });
  }

  if(ROUTE==='site-form'){
    document.querySelectorAll('.form-field-input').forEach(inp=> inp.onchange = ()=>{
      FORM_DRAFT[inp.dataset.sec][inp.dataset.key] = inp.value; markDirty();
    });
    document.querySelectorAll('.form-field-cb').forEach(cb=> cb.onchange = ()=>{
      FORM_DRAFT[cb.dataset.sec][cb.dataset.key] = cb.checked; markDirty(); render();
    });
    document.querySelectorAll('[data-tab]').forEach(b=> b.onclick = ()=>{
      // preserve typed values before switching tab
      syncFormInputs();
      UI.formTab = b.dataset.tab; render();
    });
    const siteIdInput = document.getElementById('ff-site-id');
    if(siteIdInput) siteIdInput.oninput = ()=>{ FORM_DRAFT.site_id = siteIdInput.value; };

    document.querySelectorAll('[data-copypath]').forEach(b=> b.onclick = ()=>{
      navigator.clipboard?.writeText(b.dataset.copypath).catch(()=>{});
      showToast(LANG==='ar'?'تم نسخ المسار':'Path copied');
    });
    const addFileBtn = document.getElementById('btn-add-file');
    if(addFileBtn) addFileBtn.onclick = ()=>{
      const name = document.getElementById('newfile-name').value.trim();
      const path = document.getElementById('newfile-path').value.trim();
      const section = document.getElementById('newfile-section').value;
      if(!name) return;
      FORM_DRAFT.files.push({file_id:'f'+Date.now(), name, path: path || (buildFolderPath(FORM_DRAFT.site_id||'NEW', DATA.meta.server_base_path)+name), section, added_by:CURRENT_USER.username, added_at:new Date().toISOString().slice(0,10)});
      markDirty(); render();
    };
    document.querySelectorAll('[data-delfile]').forEach(b=> b.onclick = ()=>{
      FORM_DRAFT.files = FORM_DRAFT.files.filter(f=>f.file_id!==b.dataset.delfile); markDirty(); render();
    });

    const cancelBtn = document.getElementById('btn-cancel-form');
    if(cancelBtn) cancelBtn.onclick = ()=>{ FORM_DRAFT=null; go(ROUTE_PARAM==='new'?'sites':'site-detail', ROUTE_PARAM==='new'?null:ROUTE_PARAM); };

    const saveBtn = document.getElementById('btn-save-form');
    if(saveBtn) saveBtn.onclick = ()=>{
      syncFormInputs();
      if(!FORM_DRAFT.site_id){ UI.siteIdErr = t('field_required'); render(); return; }
      const isNew = ROUTE_PARAM==='new';
      if(isNew && DATA.sites.some(s=>s.site_id===FORM_DRAFT.site_id)){ UI.siteIdErr = t('field_duplicate'); render(); return; }
      FORM_DRAFT.meta.updated_at = new Date().toISOString();
      FORM_DRAFT.meta.updated_by = CURRENT_USER.username;
      if(isNew){
        DATA.sites.push(FORM_DRAFT);
        DATA.audit_log.push({timestamp:new Date().toISOString(), user:CURRENT_USER.username, action:'CREATE', site_id:FORM_DRAFT.site_id, field:'', old_value:'', new_value:''});
      } else {
        const idx = DATA.sites.findIndex(s=>s.site_id===FORM_DRAFT.site_id);
        DATA.sites[idx] = FORM_DRAFT;
        DATA.audit_log.push({timestamp:new Date().toISOString(), user:CURRENT_USER.username, action:'UPDATE', site_id:FORM_DRAFT.site_id, field:'(multiple)', old_value:'', new_value:''});
      }
      markDirty();
      const savedId = FORM_DRAFT.site_id;
      FORM_DRAFT = null;
      showToast(LANG==='ar'?'تم الحفظ':'Saved');
      go('site-detail', savedId);
    };
  }

  if(ROUTE==='export'){
    const es = document.getElementById('ex-status'); if(es) es.onchange = ()=>{ UI.exStatus = es.value; render(); };
    const et = document.getElementById('ex-typology'); if(et) et.onchange = ()=>{ UI.exTypology = et.value; render(); };
    ['export-excel','export-csv','export-pdf'].forEach(id=>{
      const node = document.getElementById(id);
      if(node) node.onclick = ()=> showToast(LANG==='ar'?'بدأ التحميل (محاكاة)':'Download started (simulated)');
    });
  }

  if(ROUTE==='admin'){
    document.querySelectorAll('[data-admintab]').forEach(b=> b.onclick = ()=>{ UI.adminTab = b.dataset.admintab; render(); });
    document.querySelectorAll('[data-toggleactive]').forEach(b=> b.onclick = ()=>{
      const u = DATA.users.find(x=>x.user_id===b.dataset.toggleactive); u.active = !u.active; markDirty(); render();
    });
    document.querySelectorAll('[data-deluser]').forEach(b=> b.onclick = ()=>{
      const admins = DATA.users.filter(u=>u.role==='admin');
      const target = DATA.users.find(u=>u.user_id===b.dataset.deluser);
      if(target.role==='admin' && admins.length<=1){ showToast(LANG==='ar'?'لا يمكن حذف آخر مدير':"Can't delete the last admin", 'error'); return; }
      DATA.users = DATA.users.filter(u=>u.user_id!==b.dataset.deluser); markDirty(); render();
    });
    const addUserBtn = document.getElementById('btn-add-user');
    if(addUserBtn) addUserBtn.onclick = ()=>{ UI.showAddUser = true; render(); };
    const overlay = document.getElementById('modal-overlay');
    if(overlay){
      const cancel = document.getElementById('modal-cancel'); if(cancel) cancel.onclick = ()=>{ UI.showAddUser=false; render(); };
      const save = document.getElementById('modal-save');
      if(save) save.onclick = ()=>{
        const username = document.getElementById('nu-username').value.trim();
        const password = document.getElementById('nu-password').value.trim();
        const display_name = document.getElementById('nu-display').value.trim();
        const role = document.getElementById('nu-role').value;
        if(!username || !password || !display_name) return;
        DATA.users.push({user_id:'u'+Date.now(), username, password, role, display_name, active:true,
          site_access:'all', allowed_regions:[], allowed_sites:[], can_export:role!=='viewer', can_upload_files:role==='data_entry',
          created_at:new Date().toISOString().slice(0,10), created_by:CURRENT_USER.username});
        markDirty(); UI.showAddUser=false; render();
      };
    }
    const saveSettings = document.getElementById('btn-save-settings');
    if(saveSettings) saveSettings.onclick = ()=>{
      DATA.meta.server_base_path = document.getElementById('settings-basepath').value;
      markDirty(); showToast(LANG==='ar'?'تم الحفظ':'Saved');
    };
  }
}

function syncFormInputs(){
  document.querySelectorAll('.form-field-input').forEach(inp=>{
    if(FORM_DRAFT[inp.dataset.sec]) FORM_DRAFT[inp.dataset.sec][inp.dataset.key] = inp.value;
  });
  const siteIdInput = document.getElementById('ff-site-id');
  if(siteIdInput) FORM_DRAFT.site_id = siteIdInput.value;
}

/* ================= INIT ================= */
document.documentElement.dir = LANG==='ar'?'rtl':'ltr';
document.documentElement.lang = LANG;
render();
</script>
</body>
</html>
